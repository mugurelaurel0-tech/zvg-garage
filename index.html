<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZVG GARAGE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050000;
    color:white;
}


/* HERO */

.hero{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;

    background:
    linear-gradient(135deg,#000000,#200000,#000000);

    padding:20px;

}


h1{

    font-size:70px;
    letter-spacing:6px;

    color:#ff0000;

    text-shadow:
    0 0 10px #ff0000,
    0 0 30px #ff0000,
    0 0 60px #ff0000;

}



.hero p{

    margin-top:15px;
    font-size:25px;
    color:#ddd;

}



.hero-image{

    max-width:90%;
    height:auto;

    border-radius:25px;

    margin:35px 0;

    border:3px solid #ff0000;

    box-shadow:
    0 0 20px #ff0000,
    0 0 50px rgba(255,0,0,.6);

}



/* BUTON */

button{

    margin-top:20px;

    padding:18px 45px;

    font-size:20px;

    border:none;

    border-radius:50px;

    background:#ff0000;

    color:white;

    cursor:pointer;

    font-weight:bold;

    box-shadow:
    0 0 15px #ff0000,
    0 0 40px #ff0000;

    transition:.3s;

}


button:hover{

    transform:scale(1.1);

    background:#ff3333;

}



/* SERVICII */

.servicii{

    padding:80px 20px;

    text-align:center;

    background:#0b0000;

}



.servicii h1{

    font-size:50px;

}



.card{

    background:#160000;

    padding:30px;

    margin:20px auto;

    max-width:400px;

    border-radius:20px;

    font-size:22px;

    border:1px solid #ff0000;

    box-shadow:
    0 0 15px rgba(255,0,0,.5);

    transition:.3s;

}



.card:hover{

    transform:translateY(-10px);

    box-shadow:
    0 0 30px #ff0000,
    0 0 60px rgba(255,0,0,.7);

}



/* MOBILE */

@media(max-width:700px){

h1{

font-size:45px;

}

.hero p{

font-size:20px;

}

}

</style>

</head>


<body>


<section class="hero">


<h1>ZVG GARAGE</h1>


<p>
Premium Auto Detailing Iași
</p>



<img src="D862A622-A7FA-4830-8BC0-001F9453C36D.png"
alt="ZVG Garage Auto Detailing"
class="hero-image">



<button onclick="alert('Programările vor fi disponibile în curând! 🚗🔥')">

Programează-te

</button>


</section>




<section class="servicii">


<h1>
Serviciile Noastre
</h1>



<div class="card">
✨ Detailing Interior
</div>


<div class="card">
🚗 Detailing Exterior
</div>


<div class="card">
💎 Protecție Ceramică
</div>


<div class="card">
🛞 Polish Profesional
</div>



</section>


</body>

</html>
